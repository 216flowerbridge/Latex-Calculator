<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LaTeX Math Studio</title>
  <link rel="stylesheet" href="../../node_modules/katex/dist/katex.min.css" />
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <h1>LaTeX Math Studio</h1>
        <p>输入 LaTeX 公式，自动识别数学结构，并执行化简、求导、积分、极限、解方程和矩阵计算。</p>
      </div>
      <div class="badge">Standalone Desktop App</div>
    </header>

    <section class="layout">
      <section class="panel input-panel">
        <div class="panel-title">
          <h2>公式输入</h2>
          <button id="clearBtn" class="secondary">清空</button>
        </div>

        <label for="exampleSelect">示例</label>
        <select id="exampleSelect"></select>

        <label for="latexInput">LaTeX 代码</label>
        <textarea id="latexInput" spellcheck="false"></textarea>

        <div class="button-row">
          <button id="matrixBtn" class="secondary">插入矩阵模板</button>
          <button id="copyInputBtn" class="secondary">复制输入</button>
        </div>

        <h3>公式预览</h3>
        <div id="preview" class="formula-preview"></div>
      </section>

      <section class="panel settings-panel">
        <h2>计算设置</h2>

        <label for="operationSelect">计算操作</label>
        <select id="operationSelect">
          <option>自动判断</option>
          <option>化简</option>
          <option>数值计算</option>
          <option>求导</option>
          <option>不定积分</option>
          <option>定积分</option>
          <option>极限</option>
          <option>解方程</option>
          <option>变量代入</option>
          <option>矩阵行列式</option>
          <option>矩阵逆</option>
          <option>矩阵转置</option>
        </select>

        <div class="grid-two">
          <div>
            <label for="variableInput">变量</label>
            <input id="variableInput" value="x" />
          </div>
          <div>
            <label for="orderInput">求导阶数</label>
            <input id="orderInput" type="number" min="1" max="10" value="1" />
          </div>
        </div>

        <label>定积分范围</label>
        <div class="grid-two">
          <input id="lowerInput" placeholder="下限，如 0" />
          <input id="upperInput" placeholder="上限，如 pi" />
        </div>

        <label>极限设置</label>
        <div class="grid-two">
          <input id="approachInput" value="0" placeholder="趋近值" />
          <select id="directionSelect">
            <option value="">双侧</option>
            <option value="+">右极限</option>
            <option value="-">左极限</option>
          </select>
        </div>

        <label for="subsInput">变量代入</label>
        <input id="subsInput" placeholder="例如：x=2, y=pi" />

        <button id="calculateBtn" class="primary">计算</button>

        <div class="hint">
          <strong>识别策略：</strong>先清洗 LaTeX 排版命令，再把分数、根式、函数、指数、矩阵、方程转换为计算表达式。
        </div>
      </section>

      <section class="panel output-panel">
        <div class="panel-title">
          <h2>输出结果</h2>
          <button id="copyResultBtn" class="secondary">复制结果</button>
        </div>

        <nav class="tabs">
          <button class="tab active" data-tab="result">结果</button>
          <button class="tab" data-tab="latex">结果 LaTeX</button>
          <button class="tab" data-tab="parsed">识别细节</button>
          <button class="tab" data-tab="error">错误</button>
        </nav>

        <section id="resultTab" class="tab-page active">
          <pre id="resultOutput"></pre>
        </section>

        <section id="latexTab" class="tab-page">
          <pre id="latexOutput"></pre>
        </section>

        <section id="parsedTab" class="tab-page">
          <pre id="parsedOutput"></pre>
        </section>

        <section id="errorTab" class="tab-page">
          <pre id="errorOutput"></pre>
        </section>
      </section>
    </section>
  </main>

  <script src="./js/renderer.js"></script>
</body>
</html>
